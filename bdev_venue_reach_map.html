var ctrl = document.getElementById('controls');
VENUES.forEach(function(v) {
  var btn = document.createElement('button');
  btn.className = 'vb on';
  btn.style.borderColor = v.color;
  btn.style.backgroundColor = v.color;
  btn.innerHTML = '<span class="dot" style="background:' + v.color + '"></span>' + v.name;
  btn.onclick = function() {
    if (active[v.name]) {
      active[v.name] = false;
      btn.classList.remove('on');
      btn.style.backgroundColor = 'transparent';
      btn.style.color = '#aaa';
      layers[v.name].forEach(function(c){ circleGroup.removeLayer(c); });
    } else {
      active[v.name] = true;
      btn.classList.add('on');
      btn.style.backgroundColor = v.color;
      btn.style.color = '#111';
      layers[v.name].forEach(function(c){ c.addTo(circleGroup); });
    }
  };
  ctrl.appendChild(btn);
});

var pl = document.createElement('span');
pl.className = 'cl';
pl.style.marginLeft = '10px';
pl.style.paddingLeft = '10px';
pl.style.borderLeft = '1px solid rgba(255,255,255,0.1)';
pl.textContent = '◇ Prospective: Waterworks House (WH) · The West Mill (WM)';
ctrl.appendChild(pl);

// Legend venues
var legv = document.getElementById('legvenues');
VENUES.forEach(function(v) {
  legv.innerHTML += '<div class="lr"><span class="ld" style="background:' + v.color + '"></span>' + v.name + '</div>';
});
</script>
</body>
</html>
